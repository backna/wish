<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>백나타자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6ff;
    --surface: #ffffff;
    --surface2: #edf0ff;
    --border: #cdd5f8;
    --accent: #4263eb;
    --accent2: #e83070;
    --text: #1a1f3a;
    --text-muted: #6b7280;
    --correct: #1a1f3a;
    --error: #dc2626;
    --pending: #c8d0f0;
    --success: #059669;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

  header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .header-title { font-size:14px; font-weight:500; color:var(--text-muted); letter-spacing:.05em; }
  .header-title span { color:var(--accent); font-weight:700; }
  .header-actions { display:flex; gap:10px; align-items:center; }
  .btn { padding:7px 16px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:13px; cursor:pointer; transition:all .15s; font-weight:500; }
  .btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  .btn:disabled { opacity:.35; cursor:not-allowed; }
  .btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn-primary:hover:not(:disabled) { filter:brightness(1.12); color:#fff; }
  .btn-danger { background:var(--accent2); border-color:var(--accent2); color:#fff; }
  .btn-danger:hover:not(:disabled) { filter:brightness(1.12); color:#fff; }

  .toggle-inline { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-muted); user-select:none; padding-right:12px; margin-right:4px; border-right:1px solid var(--border); }
  .toggle-inline span { white-space:nowrap; }
  .toggle-inline.disabled { opacity:.35; pointer-events:none; }
  .toggle { position:relative; width:34px; height:20px; flex-shrink:0; }
  .toggle input { opacity:0; width:0; height:0; }
  .toggle-slider { position:absolute; inset:0; background:var(--border); border-radius:20px; cursor:pointer; transition:.2s; }
  .toggle-slider::after { content:''; position:absolute; width:14px; height:14px; background:#fff; border-radius:50%; top:3px; left:3px; transition:.2s; }
  .toggle input:checked + .toggle-slider { background:var(--accent); }
  .toggle input:checked + .toggle-slider::after { transform:translateX(14px); }

  main { display:flex; flex:1; min-height:0; }
  aside { width:220px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); padding:28px 20px; display:flex; flex-direction:column; gap:24px; }
  .stat-block { display:flex; flex-direction:column; gap:4px; }
  .stat-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.08em; }
  .stat-value { font-family:'JetBrains Mono',monospace; font-size:28px; font-weight:600; color:var(--text); }
  .stat-value.error-val { color:var(--error); }
  .stat-bar-bg { height:3px; background:var(--border); border-radius:2px; margin-top:6px; overflow:hidden; }
  .stat-bar-fill { height:100%; border-radius:2px; background:var(--accent); transition:width .3s; }
  .sidebar-actions { margin-top:auto; display:flex; flex-direction:column; gap:10px; }

  .content { flex:1; display:flex; flex-direction:column; padding:40px; min-width:0; overflow-y:auto; }
  .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; color:var(--text-muted); }
  .empty-icon { font-size:48px; opacity:.3; }
  .empty-state p { font-size:14px; line-height:1.6; text-align:center; }

  .typing-wrap { display:none; flex-direction:column; flex:1; }
  .typing-wrap.active { display:flex; }

  /* 상단 미리보기 */
  .preview-container { background:var(--surface); border:1px solid var(--border); border-bottom:none; border-radius:10px 10px 0 0; padding:0 32px; height:72px; overflow:hidden; position:relative; }
  .preview-track { position:absolute; left:32px; right:32px; top:0; }
  .preview-row { height:72px; display:flex; align-items:center; letter-spacing:.03em; line-height:1; white-space:nowrap; overflow:hidden; }
  .preview-row.row-next { display:none; }
  .char { color:var(--pending); flex-shrink:0; }
  .char.correct { color:var(--correct); font-weight:600; }
  .char.error   { color:var(--error); font-weight:600; }

  .progress-bar-bg { height:3px; background:var(--border); overflow:hidden; }
  .progress-bar-fill { height:100%; background:var(--accent); transition:width .25s; }

  /* 입력 표시줄 */
  .typed-display-wrap { background:var(--surface2); border:1px solid var(--border); border-top:none; border-radius:0 0 10px 10px; height:72px; position:relative; display:flex; align-items:center; padding:0 32px; overflow:hidden; cursor:text; }
  .typed-display { letter-spacing:.03em; white-space:nowrap; flex:1; display:flex; align-items:center; overflow:hidden; pointer-events:none; }
  .td-char { flex-shrink:0; }
  .td-char.ok  { color:var(--correct); font-weight:600; }
  .td-char.bad { color:var(--error); font-weight:600; }
  .td-char.skip-char { color:var(--text-muted); }
  .td-caret { display:inline-block; width:2px; height:30px; background:var(--accent); margin-left:1px; flex-shrink:0; vertical-align:middle; animation:blink .9s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  #typing-box {
    position:absolute; inset:0; opacity:0; border:none; outline:none;
    background:transparent; color:transparent; caret-color:transparent;
  }

  /* ── 고스트 미리보기 줄 ── */
  .ghost-preview-wrap {
    background:var(--surface);
    border:1px solid var(--border);
    border-top: 1px dashed var(--border);
    border-bottom: none;
    border-radius:0;
    height:72px;
    padding:0 32px;
    overflow:hidden;
    position:relative;
  }
  /* 슬라이드 애니메이션용 트랙 */
  .ghost-track {
    position:absolute; left:32px; right:32px; top:0;
  }
  .ghost-row {
    height:72px; display:flex; align-items:center;
    letter-spacing:.03em; line-height:1;
    white-space:nowrap; overflow:hidden;
  }
  .ghost-char {
    color: var(--pending);
    opacity: 0.6;
    flex-shrink:0;
  }
  /* 구분선 레이블 */
  .ghost-label {
    position:absolute; top:6px; right:12px;
    font-size:10px; color:rgba(107,114,128,0.5);
    letter-spacing:.06em; text-transform:uppercase;
    pointer-events:none;
  }

  /* RESULT */
  .result-wrap { display:none; flex-direction:column; align-items:center; justify-content:center; flex:1; gap:24px; }
  .result-wrap.active { display:flex; }
  .result-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px 48px; text-align:center; min-width:340px; }
  .result-card h2 { font-size:18px; color:var(--success); margin-bottom:24px; letter-spacing:.05em; }
  .result-stats { display:grid; grid-template-columns:1fr 1fr; gap:20px 32px; }
  .result-stat .label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.08em; }
  .result-stat .value { font-family:'JetBrains Mono',monospace; font-size:32px; font-weight:700; margin-top:4px; }
  .result-stat .value.e   { color:var(--error); }
  .result-stat .value.acc { color:var(--success); }

  /* ── 테마 피커 ── */
  .theme-picker { display:flex; align-items:center; gap:8px; padding-right:12px; margin-right:4px; border-right:1px solid var(--border); }
  .theme-dot { width:20px; height:20px; border-radius:50%; border:2.5px solid transparent; cursor:pointer; padding:0; transition:all .15s; outline:none; flex-shrink:0; }
  .theme-dot:hover { transform:scale(1.22); }
  .theme-dot.on { border-color:#222; box-shadow:0 0 0 2px rgba(0,0,0,0.18); transform:scale(1.22); }
  .theme-picker.dark-mode .theme-dot.on { border-color:#fff; box-shadow:0 0 0 2px rgba(255,255,255,0.30); }
  .t-pink    { background:#b87880; }
  .t-purple  { background:#8070a8; }
  .t-orange  { background:#f07830; }
  .t-mint    { background:#4a9e8a; }
  .t-skyblue { background:#5088a8; }
  .t-gray    { background:#2a2a2a; }
</style>
</head>
<body>

<header>
  <div class="header-title"><span>백나</span> <span id="title-deco" style="color:var(--text-muted);font-weight:400;">타자₍՞ • 🐽 • ՞₎ ˚₊·—♡</span></div>
  <div class="header-actions">
    <div class="theme-picker">
      <button class="theme-dot t-pink    on" onclick="setTheme('pink',this)"    title="핑크"></button>
      <button class="theme-dot t-purple"     onclick="setTheme('purple',this)"  title="보라"></button>
      <button class="theme-dot t-orange"     onclick="setTheme('orange',this)"  title="주황"></button>
      <button class="theme-dot t-mint"       onclick="setTheme('mint',this)"    title="민트"></button>
      <button class="theme-dot t-skyblue"    onclick="setTheme('skyblue',this)" title="블루"></button>
      <button class="theme-dot t-gray"       onclick="setTheme('gray',this)"    title="다크"></button>
    </div>
    <label class="toggle-inline" id="ignore-toggle-wrap">
      <span>띄어쓰기·문장부호 무시</span>
      <label class="toggle">
        <input type="checkbox" id="ignore-spaces" checked>
        <span class="toggle-slider"></span>
      </label>
    </label>
    <input type="file" id="file-input" accept=".txt" style="display:none">
    <div style="width:1px;height:22px;background:var(--border);margin:0 4px;flex-shrink:0;"></div>
    <button class="btn" id="btn-load">불러오기</button>
    <button class="btn btn-primary" id="btn-start" disabled>시작(F9)</button>
    <button class="btn btn-danger"  id="btn-end"   style="display:none" disabled>종료(ESC)</button>
  </div>
</header>

<main>
  <aside>
    <div class="stat-block">
      <div class="stat-label">경과 시간</div>
      <div class="stat-value" id="stat-time">00:00</div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" id="bar-time" style="width:0%"></div></div>
    </div>
    <div class="stat-block">
      <div class="stat-label">타수 (자/분)</div>
      <div class="stat-value" id="stat-speed">0자</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">오자</div>
      <div class="stat-value error-val" id="stat-errors">0자</div>
    </div>
    <div class="sidebar-actions">
      <button class="btn" id="btn-reset" disabled>초기화</button>
    </div>
  </aside>

  <div class="content">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">⌨️</div>
      <p>텍스트 파일을 불러온 후<br>F9를 눌러 시작하세요</p>
    </div>

    <div class="typing-wrap" id="typing-wrap">
      <!-- 상단: 목표 텍스트 미리보기 -->
      <div class="preview-container">
        <div class="preview-track" id="preview-track">
          <div class="preview-row row-cur"  id="row-cur"></div>
          <div class="preview-row row-next" id="row-next"></div>
        </div>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>

      <!-- 중간: 다음 청크 고스트 미리보기 -->
      <div class="ghost-preview-wrap" id="ghost-preview-wrap">
        <span class="ghost-label">next</span>
        <div class="ghost-track" id="ghost-track">
          <div class="ghost-row" id="ghost-row"></div>
        </div>
      </div>

      <!-- 하단: 입력 표시줄 -->
      <div class="typed-display-wrap" id="typed-display-wrap">
        <div class="typed-display" id="typed-display"></div>
        <input id="typing-box" type="text" lang="ko" inputmode="text" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" disabled>
      </div>
    </div>

    <div class="result-wrap" id="result-wrap">
      <div class="result-card">
        <h2>✓ 완료</h2>
        <div class="result-stats">
          <div class="result-stat"><div class="label">시간</div><div class="value" id="res-time">—</div></div>
          <div class="result-stat"><div class="label">타수</div><div class="value" id="res-speed">—</div></div>
          <div class="result-stat"><div class="label">오자</div><div class="value e" id="res-errors">—</div></div>
          <div class="result-stat"><div class="label">정답률</div><div class="value acc" id="res-accuracy">—</div></div>
        </div>
      </div>
      <button class="btn btn-primary" id="btn-retry">다시 연습</button>
    </div>
  </div>
</main>

<script>
const ignoreToggle = document.getElementById('ignore-spaces');
const ignoreWrap   = document.getElementById('ignore-toggle-wrap');
const fileInput    = document.getElementById('file-input');
const btnLoad      = document.getElementById('btn-load');
const btnStart     = document.getElementById('btn-start');
const btnEnd       = document.getElementById('btn-end');
const btnReset     = document.getElementById('btn-reset');
const btnRetry     = document.getElementById('btn-retry');
const previewTrack = document.getElementById('preview-track');
const rowCur       = document.getElementById('row-cur');
const rowNext      = document.getElementById('row-next');
const typingBox    = document.getElementById('typing-box');
const typedDisplay = document.getElementById('typed-display');
const typedWrap    = document.getElementById('typed-display-wrap');
const emptyState   = document.getElementById('empty-state');
const typingWrap   = document.getElementById('typing-wrap');
const resultWrap   = document.getElementById('result-wrap');
const statTime     = document.getElementById('stat-time');
const statSpeed    = document.getElementById('stat-speed');
const statErrors   = document.getElementById('stat-errors');
const resTime      = document.getElementById('res-time');
const resSpeed     = document.getElementById('res-speed');
const resErrors    = document.getElementById('res-errors');
const resAccuracy  = document.getElementById('res-accuracy');
const progressFill = document.getElementById('progress-fill');
const ghostTrack   = document.getElementById('ghost-track');
const ghostRow     = document.getElementById('ghost-row');

let rawText = '', allChars = [], nonSkipChars = [], allIdxOfNonSkip = [];
let charResults = [], judgedCount = 0, errorCount = 0, correctCount = 0;
let errorEver = [], timerInterval = null, startTime = null, elapsedSec = 0, running = false;
let chunks = [], curChunk = 0;
const CHUNK_SIZE = 28;

// ── 반응형 글자 크기 ──────────────────────────────────────────────────────
const previewContainer = document.querySelector('.preview-container');
const MAX_FONT = 26, MIN_FONT = 10;

function applyFontSize(px) {
  const s = px + 'px';
  rowCur.style.fontSize   = s;
  rowNext.style.fontSize  = s;
  ghostRow.style.fontSize = s;
  typedDisplay.style.fontSize = s;
  typingBox.style.fontSize    = s;
  // 커서 높이도 비례 조정
  const carets = typedDisplay.querySelectorAll('.td-caret');
  carets.forEach(c => { c.style.height = Math.round(px * 1.15) + 'px'; });
}

function calcFontSize(containerWidth) {
  // 패딩 64px(양쪽 32px) 제외한 실제 텍스트 영역
  const avail = containerWidth - 64;
  // 한글 1글자 ≈ 1em, letter-spacing .03em → 1.03em/char
  const computed = Math.floor(avail / (CHUNK_SIZE * 1.08));
  return Math.max(MIN_FONT, Math.min(MAX_FONT, computed));
}

const _ro = new ResizeObserver(entries => {
  for (const e of entries) {
    applyFontSize(calcFontSize(e.contentRect.width));
  }
});
// typing-wrap가 active될 때도 관찰 시작, 처음엔 content 영역 기준
const contentEl = document.querySelector('.content');
_ro.observe(contentEl);
// 초기 적용
applyFontSize(calcFontSize(contentEl.getBoundingClientRect().width));

function isSkip(ch) {
  if (!ignoreToggle.checked) return false;
  if (ch === '%') return false; // 항상 채점 대상
  return /[^가-힣a-zA-Z0-9]/.test(ch);
}
function formatTime(s) { return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
function getSpeed() { return Math.round(correctCount / (elapsedSec/60 || 0.001)); }
function getAccuracy() {
  const t = nonSkipChars.length;
  return t === 0 ? '100.00' : ((t - errorCount) / t * 100).toFixed(2);
}

function buildChars(text) {
  allChars = [...text].map(ch => ({ char:ch, skip:isSkip(ch) }));
  nonSkipChars = []; allIdxOfNonSkip = [];
  allChars.forEach((o,i) => { if (!o.skip) { allIdxOfNonSkip.push(i); nonSkipChars.push(o.char); } });
  charResults = new Array(nonSkipChars.length).fill(null);
  errorEver   = new Array(nonSkipChars.length).fill(false);
  judgedCount = 0;
  buildChunks(); curChunk = 0;
}

function buildChunks() {
  chunks = [];
  const total = nonSkipChars.length;
  if (!total) return;
  let ns = 0;
  while (ns < total) {
    const ne = Math.min(ns + CHUNK_SIZE, total);
    const allStart = allIdxOfNonSkip[ns];
    const allEnd   = ne < total ? allIdxOfNonSkip[ne] : allChars.length;
    chunks.push({ nsiStart:ns, nsiEnd:ne, allStart, allEnd });
    ns = ne;
  }
}

// ── 상단 미리보기 행 HTML ──────────────────────────────────────────────────
function buildRowHTML(ci) {
  if (ci >= chunks.length) return '<span style="color:var(--text-muted);font-size:14px">끝</span>';
  const c = chunks[ci];
  let html = '', nsi = c.nsiStart;
  for (let i = c.allStart; i < c.allEnd; i++) {
    const o  = allChars[i];
    const ch = o.char === ' ' ? '&nbsp;' : o.char;
    if (o.skip) {
      const r = nsi > 0 ? charResults[nsi-1] : null;
      html += `<span class="char${r==='correct'?' correct':r==='error'?' error':''}">${ch}</span>`;
    } else {
      const r = charResults[nsi];
      html += `<span class="char${r==='correct'?' correct':r==='error'?' error':''}">${ch}</span>`;
      nsi++;
    }
  }
  return html;
}

// ── 고스트 행 HTML (다음 청크, 투명 스타일) ───────────────────────────────
function buildGhostHTML(ci) {
  if (ci >= chunks.length) return '';
  const c = chunks[ci];
  let html = '';
  for (let i = c.allStart; i < c.allEnd; i++) {
    const o  = allChars[i];
    const ch = o.char === ' ' ? '&nbsp;' : o.char;
    html += `<span class="ghost-char">${ch}</span>`;
  }
  return html;
}

function rebuildRows() {
  rowCur.innerHTML  = buildRowHTML(curChunk);
  rowNext.innerHTML = buildRowHTML(curChunk + 1);
  ghostRow.innerHTML = buildGhostHTML(curChunk + 1);
}

function renderPreview() {
  let nc = 0;
  for (let i = 0; i < chunks.length; i++) {
    if (judgedCount < chunks[i].nsiEnd) { nc = i; break; }
    nc = i;
  }

  if (nc > curChunk) {
    // 앞으로 진행 — 위 미리보기는 아래로, 고스트는 위로 슬라이드
    curChunk = nc;

    // 상단 미리보기 슬라이드
    previewTrack.style.transition = 'transform .09s cubic-bezier(.4,0,.2,1)';
    previewTrack.style.transform  = 'translateY(-58px)';

    // 고스트 줄: 위로 슬라이드 (사라지는 방향 — 새 고스트는 아래서 올라옴)
    ghostTrack.style.transition = 'transform .09s cubic-bezier(.4,0,.2,1)';
    ghostTrack.style.transform  = 'translateY(-72px)';

    setTimeout(() => {
      previewTrack.style.transition = 'none';
      previewTrack.style.transform  = 'translateY(0)';
      ghostTrack.style.transition = 'none';
      ghostTrack.style.transform  = 'translateY(72px)'; // 아래에서 대기
      rebuildRows();
      // 살짝 delay 후 자연스럽게 제자리로
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          ghostTrack.style.transition = 'transform .08s cubic-bezier(.4,0,.2,1)';
          ghostTrack.style.transform  = 'translateY(0)';
        });
      });
    }, 110);

  } else if (nc < curChunk) {
    curChunk = nc;
    previewTrack.style.transition = 'transform .09s cubic-bezier(.4,0,.2,1)';
    previewTrack.style.transform  = 'translateY(58px)';
    ghostTrack.style.transition = 'transform .09s cubic-bezier(.4,0,.2,1)';
    ghostTrack.style.transform  = 'translateY(72px)';
    setTimeout(() => {
      previewTrack.style.transition = 'none';
      previewTrack.style.transform  = 'translateY(0)';
      ghostTrack.style.transition = 'none';
      ghostTrack.style.transform  = 'translateY(-72px)';
      rebuildRows();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          ghostTrack.style.transition = 'transform .08s cubic-bezier(.4,0,.2,1)';
          ghostTrack.style.transform  = 'translateY(0)';
        });
      });
    }, 110);
  } else {
    rebuildRows();
  }

  const total = nonSkipChars.length;
  if (total > 0) progressFill.style.width = Math.round(judgedCount/total*100)+'%';
}

function updateStats() {
  statTime.textContent   = formatTime(elapsedSec);
  statSpeed.textContent  = getSpeed()+'자';
  statErrors.textContent = errorCount+'자';
}

let composing = false;

// ════════════════════════════════════════════════════════════════════
//  핵심 버그 원인 (3벌식 + 창 전환)
//  ──────────────────────────────────────────────────────────────────
//  3벌식은 1키=1글자 완성이지만 브라우저 IME는 내부적으로
//  compositionstart → compositionend 사이클을 돌립니다.
//  다른 창에 갔다 돌아올 때 blur 와 compositionend 발생 순서가
//  브라우저/OS마다 다릅니다:
//
//  [버그 경로]
//  blur 먼저 발생
//    → composing=false 세팅 + rAF(value 복원) 예약
//    → 그 직후 compositionend 발생 (rAF 실행 전!)
//    → isSafeToRecompute=true 이므로 오염된 value 로 recompute() 실행
//    → 멀쩡한 글자 오자 처리 + errorEver[] 기록 (복원 불가)
//    → 게다가 lastSafeValue 가 "마지막 조합 직전" 이라
//      한 글자 빠진 채로 복원 → 이후 글자 전체 한 칸 밀려 오자 폭탄
//
//  [해결 전략]
//  1) isSafeToRecompute 플래그:
//     blur 발생 순간 false 로 잠금 → compositionend/input 의
//     recompute 호출을 차단. value 복원 + 재채점 완료 후 true 복원.
//  2) visibilitychange 선제 처리:
//     탭이 숨겨지는 순간 value 를 lastSafeValue 로 강제 고정 +
//     composing 리셋. blur 가 발생해도 이미 value 가 안전한 상태.
//  3) compositionend value 감소 방어:
//     예외 경로로 value 가 줄었을 때 lastSafeValue 로 복원.
// ════════════════════════════════════════════════════════════════════
let lastSafeValue = ''; // 마지막 정상 채점 완료 value 스냅샷

function recompute() {
  if (!running) return;
  const typed = [...typingBox.value];
  let ni = 0;
  charResults.fill(null);
  let newCorrect = 0;
  for (let i = 0; i < typed.length; i++) {
    const ch = typed[i];
    if (isSkip(ch)) continue;
    if (ni < nonSkipChars.length) {
      const ok = (ch === nonSkipChars[ni]);
      charResults[ni] = ok ? 'correct' : 'error';
      if (!ok && !errorEver[ni]) { errorEver[ni] = true; errorCount++; }
      if (ok) newCorrect++;
      ni++;
    }
  }
  judgedCount = ni;
  correctCount = newCorrect;
  lastSafeValue = typingBox.value; // 정상 채점 완료 → 스냅샷 갱신
  renderPreview();
  updateStats();
  updateTypedDisplay();
  if (nonSkipChars.length > 0 && judgedCount >= nonSkipChars.length) setTimeout(finishTest, 80);
}
function updateTypedDisplay() {
  if (!running) { typedDisplay.innerHTML = ''; return; }
  const c = chunks[curChunk];
  if (!c) return;
  const typedNonSkip = [...typingBox.value].filter(ch => !isSkip(ch));
  let html = '', nsi = c.nsiStart, caretPlaced = false;
  for (let ai = c.allStart; ai < c.allEnd; ai++) {
    const o = allChars[ai];
    const disp = o.char === ' ' ? '&nbsp;' : o.char;
    if (o.skip) {
      html += `<span class="td-char skip-char">${disp}</span>`;
    } else {
      const typedCh = typedNonSkip[nsi];
      if (typedCh === undefined) {
        if (!caretPlaced) { html += '<span class="td-caret"></span>'; caretPlaced = true; }
        break;
      }
      const ok = (typedCh === nonSkipChars[nsi]);
      const actualDisp = ok ? disp : (typedCh === ' ' ? '&nbsp;' : typedCh);
      html += `<span class="td-char ${ok?'ok':'bad'}">${actualDisp}</span>`;
      nsi++;
    }
  }
  if (!caretPlaced) html += '<span class="td-caret"></span>';
  typedDisplay.innerHTML = html;
}

// ── IME 이벤트 ──────────────────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════
//  IME / 포커스 이벤트 처리
//  ──────────────────────────────────────────────────────────────────
//  [기존 코드의 남은 버그 원인 분석]
//
//  버그 1: blur 핸들러 안에서 typingBox.focus() 를 호출하면
//    → 새 focus 이벤트 → 브라우저에 따라 즉시 또 blur 발생
//    → isSafeToRecompute 가 다시 false 로 잠김
//    → 이후 모든 타이핑이 채점 차단 상태에 갇힘
//    → "일정 시간 후 타이핑하면 전부 오자" 현상의 진짜 원인
//
//  버그 2: visibilitychange(복귀) 에서 recompute() 를 직접 호출하면
//    → 그 직후 blur 가 발생해 타이밍 충돌
//    → blur 핸들러가 isSafeToRecompute=false 로 다시 잠금
//    → 이후 타이핑 전부 차단
//
//  [해결 전략]
//  ① blur 핸들러에서 focus() 를 절대 호출하지 않는다.
//    대신 window 레벨 pointerdown/keydown 에서 포커스를 유지한다.
//    (재포커싱을 blur 핸들러 밖에서 처리 → 재귀 blur 원천 차단)
//  ② visibilitychange(복귀) 에서 recompute() 를 직접 호출하지 않는다.
//    value 만 복원하고 isSafeToRecompute 를 true 로 열어 두면
//    사용자가 다음 키를 치는 순간 input 이벤트가 정상 채점한다.
//  ③ blur 자체는 value 스냅샷 복원만 하고 잠금을 즉시 해제한다.
//    (잠금을 rAF 까지 유지하면 그 사이 compositionend 가 통과하는
//     또 다른 레이스가 생기므로, 동기적으로 복원 후 즉시 해제)
// ════════════════════════════════════════════════════════════════════

typingBox.addEventListener('compositionstart', () => {
  composing = true;
});

typingBox.addEventListener('compositionend', () => {
  composing = false;
  // IME 가 value 를 강제로 줄인 경우(창 전환 등) 스냅샷으로 복원
  if (typingBox.value.length < lastSafeValue.length) {
    typingBox.value = lastSafeValue;
  }
  recompute();
});

typingBox.addEventListener('keydown', e => {
  if (!running) return;
  if (e.key === 'Enter') { e.preventDefault(); return; }
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End'].includes(e.key)) {
    e.preventDefault(); return;
  }
  if (e.key === 'Backspace' && ignoreToggle.checked) {
    e.preventDefault();
    let chars = [...typingBox.value];
    if (!chars.length) return;
    // 끝 글자 삭제 후, 새 끝 글자가 skip이면 계속 삭제
    chars.pop();
    while (chars.length > 0 && isSkip(chars[chars.length - 1])) {
      chars.pop();
    }
    typingBox.value = chars.join('');
    recompute();
    moveCursorToEnd();
    return;
  }
});

typingBox.addEventListener('input', () => {
  if (!running || composing) return;
  recompute();
  moveCursorToEnd();
});

// ── blur: value 복원만 하고 즉시 잠금 해제 ──────────────────────────────────
// focus() 를 blur 핸들러 안에서 호출하면 재귀 blur 가 발생한다.
// 대신 window 의 pointerdown/keydown 에서 포커스를 복구한다.
typingBox.addEventListener('blur', () => {
  if (!running) return;
  composing = false;
  // 동기적으로 value 를 스냅샷으로 복원 (rAF 없이 즉시)
  // → 이후 compositionend 등이 와도 이미 안전한 value
  typingBox.value = lastSafeValue;
  // 잠금은 사용하지 않음 (잠금 자체가 레이스 원인이었음)
  // value 를 이미 복원했으므로 어떤 이벤트가 와도 lastSafeValue 로 채점됨
});

typedWrap.addEventListener('click', () => {
  if (running) { typingBox.focus(); moveCursorToEnd(); }
});

// ── 포커스 유지: blur 핸들러 바깥에서 재포커싱 ───────────────────────────────
// window 레벨 pointerdown/keydown 에서 포커스가 typingBox 에 없으면 복원.
// blur 핸들러 내부에서 focus() 를 호출하지 않으므로 재귀 blur 없음.
window.addEventListener('pointerdown', () => {
  if (running && document.activeElement !== typingBox) {
    typingBox.focus();
    moveCursorToEnd();
  }
}, true); // capture 단계 — 어느 요소를 클릭해도 먼저 실행됨

window.addEventListener('keydown', e => {
  if (!running) return;
  // 단축키(F9, Escape) 는 별도 처리되므로 일반 키 입력 시에만 포커스 복원
  if (e.key === 'F9' || e.key === 'Escape') return;
  if (document.activeElement !== typingBox) {
    typingBox.focus();
    moveCursorToEnd();
  }
}, true);

function moveCursorToEnd() {
  const len = typingBox.value.length;
  typingBox.setSelectionRange(len, len);
}

// 커서 위치 고정
typingBox.addEventListener('select',  () => { if (running) moveCursorToEnd(); });
typingBox.addEventListener('mouseup', () => { if (running) moveCursorToEnd(); });
typingBox.addEventListener('keyup', e => {
  if (!running) return;
  if (!['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End'].includes(e.key)) moveCursorToEnd();
});
typingBox.addEventListener('focus', () => { if (running) setTimeout(moveCursorToEnd, 0); });

// ── 창/탭 전환 복귀 시 IME 재초기화 ─────────────────────────────────────────
// blur/focus 사이클은 blur 핸들러와 충돌해 오히려 역효과.
// 대신 복귀 감지 후 typingBox 의 lang 속성을 토글해
// 브라우저가 IME 를 한글 모드로 재인식하게 유도한다.
function reInitIME() {
  if (!running) return;
  // lang 토글로 IME 컨텍스트 강제 재설정
  typingBox.lang = 'ko';
  typingBox.setAttribute('lang', 'ko');
  // 포커스가 이미 typingBox 에 있으면 그대로, 없으면 복원
  if (document.activeElement !== typingBox) {
    typingBox.focus();
    moveCursorToEnd();
  }
}

window.addEventListener('focus', () => {
  // 딜레이 없이 즉시 — 타이밍 경쟁 원천 차단
  reInitIME();
});

// ── visibilitychange ──────────────────────────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (!running) return;
  if (document.hidden) {
    composing = false;
    typingBox.value = lastSafeValue;
  } else {
    reInitIME();
  }
});

btnLoad.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', ev => {
  const file = ev.target.files[0]; if (!file) return; fileInput.value = '';
  const r1 = new FileReader();
  r1.onload = e1 => {
    const text = e1.target.result;
    if (text.includes('\uFFFD') || (!/[가-힣]/.test(text) && /[\u0080-\u00FF]/.test(text))) {
      const r2 = new FileReader();
      r2.onload = e2 => loadText(e2.target.result);
      r2.readAsText(file, 'EUC-KR');
    } else { loadText(text); }
  };
  r1.readAsText(file, 'UTF-8');
});

function loadText(text) { rawText = text.replace(/[\r\n]+/g, ' ').trim(); resetToReady(); }

function resetToReady() {
  stopTimer(); running = false; errorCount = 0; correctCount = 0;
  errorEver = []; composing = false; elapsedSec = 0; curChunk = 0;
  lastSafeValue = '';
  previewTrack.style.transition = 'none'; previewTrack.style.transform = 'translateY(0)';
  ghostTrack.style.transition = 'none'; ghostTrack.style.transform = 'translateY(0)';
  buildChars(rawText); updateStats();
  typingBox.value = ''; typedDisplay.innerHTML = ''; typingBox.disabled = true;
  emptyState.style.display = 'none';
  typingWrap.classList.add('active'); resultWrap.classList.remove('active');
  btnStart.textContent = '시작(F9)'; btnStart.className = 'btn btn-primary'; btnStart.style.display = '';
  btnStart.disabled = false; btnEnd.style.display = 'none'; btnEnd.disabled = true; btnReset.disabled = true;
  rebuildRows(); progressFill.style.width = '0%';
}

btnStart.addEventListener('click', startTest);
btnEnd.addEventListener('click', () => {
  stopTest();
  rawText = '';
  rowCur.innerHTML = ''; rowNext.innerHTML = ''; ghostRow.innerHTML = '';
  typedDisplay.innerHTML = ''; progressFill.style.width = '0%';
  updateStats();
  typingWrap.classList.remove('active'); resultWrap.classList.remove('active');
  emptyState.style.display = '';
  btnStart.disabled = true; btnEnd.style.display = 'none'; btnEnd.disabled = true; btnReset.disabled = true;
  btnStart.textContent = '시작(F9)'; btnStart.className = 'btn btn-primary'; btnStart.style.display = '';
  ignoreWrap.classList.remove('disabled'); ignoreToggle.disabled = false;
});
btnReset.addEventListener('click', resetToReady);
btnRetry.addEventListener('click', resetToReady);
document.addEventListener('keydown', e => {
  if (e.key === 'F9')     { e.preventDefault(); if (!running && rawText) startTest(); }
  if (e.key === 'Escape' && running) { stopTest(); resetToReady(); }
});

function startTest() {
  if (!rawText) return;
  running = true; composing = false; judgedCount = 0; curChunk = 0;
  errorCount = 0; correctCount = 0;
  charResults = new Array(nonSkipChars.length).fill(null);
  errorEver   = new Array(nonSkipChars.length).fill(false);
  lastSafeValue = '';
  previewTrack.style.transition = 'none'; previewTrack.style.transform = 'translateY(0)';
  ghostTrack.style.transition   = 'none'; ghostTrack.style.transform   = 'translateY(0)';
  typingBox.value = ''; typedDisplay.innerHTML = '';
  typingBox.disabled = false; typingBox.focus(); moveCursorToEnd();
  startTime = Date.now(); elapsedSec = 0;
  ignoreWrap.classList.add('disabled'); ignoreToggle.disabled = true;
  timerInterval = setInterval(() => { elapsedSec = Math.floor((Date.now()-startTime)/1000); updateStats(); }, 300);
  rebuildRows(); progressFill.style.width = '0%';
  btnStart.style.display = 'none'; btnEnd.style.display = ''; btnEnd.disabled = false; btnReset.disabled = false;
}
function stopTest() {
  running = false; stopTimer(); typingBox.disabled = true;
  ignoreWrap.classList.remove('disabled'); ignoreToggle.disabled = false;
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
function finishTest() {
  if (!running) return; stopTest();
  typingWrap.classList.remove('active'); resultWrap.classList.add('active');
  resTime.textContent     = formatTime(elapsedSec);
  resSpeed.textContent    = getSpeed()+'자/분';
  resErrors.textContent   = errorCount+'자';
  resAccuracy.textContent = getAccuracy()+'%';
  btnEnd.style.display = 'none'; btnStart.style.display = '';
  btnStart.disabled = true; btnReset.disabled = true;
}

ignoreToggle.addEventListener('change', () => { if (rawText && !running) resetToReady(); });

// ── 테마 ──────────────────────────────────────────────────────────────────
const _themes = {
  // bg=pink-50, surface=white, surface2=pink-100, border, accent=pink-500, accent2=pink-400
  // text, text-muted=sub, pending=pink-200
  pink:    { '--bg':'#fdf6f7','--surface':'#ffffff','--surface2':'#f5e8eb','--border':'#e8cdd2','--accent':'#b87880','--accent2':'#c07888','--correct':'#907078','--text':'#3a2028','--text-muted':'#b09098','--error':'#f87171','--success':'#6aaa88','--pending':'#c8a0a8' },
  purple:  { '--bg':'#f7f5fa','--surface':'#ffffff','--surface2':'#ece8f5','--border':'#d8d0e8','--accent':'#8070a8','--accent2':'#9878b0','--correct':'#706880','--text':'#2a2038','--text-muted':'#9888a8','--error':'#f87171','--success':'#6aaa88','--pending':'#b0a0c8' },
  orange:  { '--bg':'#fff8f0','--surface':'#ffffff','--surface2':'#feecd8','--border':'#fcd8a8','--accent':'#f07830','--accent2':'#f07830','--correct':'#c06828','--text':'#2a1400','--text-muted':'#c08850','--error':'#f87171','--success':'#6aaa88','--pending':'#f8c080' },
  mint:    { '--bg':'#f4faf8','--surface':'#ffffff','--surface2':'#e0f0ea','--border':'#b8dcd0','--accent':'#4a9e8a','--accent2':'#4a9e8a','--correct':'#4a8878','--text':'#182e28','--text-muted':'#70a898','--error':'#f87171','--success':'#6aaa88','--pending':'#80c0b0' },
  skyblue: { '--bg':'#f4f8fc','--surface':'#ffffff','--surface2':'#e0ecf5','--border':'#b8d4e8','--accent':'#5088a8','--accent2':'#5088a8','--correct':'#487888','--text':'#182030','--text-muted':'#6090a8','--error':'#f87171','--success':'#6aaa88','--pending':'#80aec8' },
  gray:    { '--bg':'#1a1a1a','--surface':'#242424','--surface2':'#2e2e2e','--border':'#3a3a3a','--accent':'#d07878','--accent2':'#d07878','--correct':'#dddddd','--text':'#eeeeee','--text-muted':'#888888','--error':'#f87171','--success':'#4ade80','--pending':'#787878' }
};

let _currentColor = 'pink';

function setThemeColor(name) {
  _currentColor = name;
  const t = _themes[name];
  const r = document.documentElement;
  Object.keys(t).forEach(k => r.style.setProperty(k, t[k]));
  document.querySelectorAll('.theme-dot').forEach(b => b.classList.remove('on'));
  const dot = document.querySelector('.theme-dot.t-' + name);
  if (dot) dot.classList.add('on');
  // 그레이(다크)일 때 선택 표시 반전
  document.querySelector('.theme-picker').classList.toggle('dark-mode', name === 'gray');
  try { localStorage.setItem('typerTheme', name); } catch(e) {}
}

function setTheme(name, btn) { setThemeColor(name); }

// 저장된 설정 복원
(function() {
  try {
    const savedColor = localStorage.getItem('typerTheme') || 'pink';
    setThemeColor(savedColor);
  } catch(e) { setThemeColor('pink'); }
})();

emptyState.style.display = '';
typingWrap.classList.remove('active');
resultWrap.classList.remove('active');
</script>
</body>
